<div class="card h-100">
  <div class="card-header">{{ trip.name }}</div>
  <img src="assets/images/{{ trip.image }}" alt="{{ trip.name }} thumbnail" class="card-img-top">
  <div class="card-body d-flex flex-column">
    <h6 class="card-subtitle mb-2 text-muted">{{ trip.resort }}</h6>
    <p class="card-subtitle mt-3 mb-3 text-muted">
      {{ trip.length }} only {{ trip.perPerson | currency:'USD':'symbol' }} per person
    </p>
    <p class="card-text" [innerHTML]="trip.description"></p>
    <div class="mt-auto d-flex gap-2">
      <button type="button" class="btn btn-sm btn-primary" (click)="editTrip(trip)">Edit Trip</button>
      <button type="button" class="btn btn-sm btn-outline-danger" (click)="deleteTrip(trip)">Delete</button>
    </div>
  </div>
</div>
