<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h1>Trip Listing</h1>
    <p class="text-muted">{{ message }}</p>
  </div>
  <button type="button" class="btn btn-info" (click)="addTrip()">Add Trip</button>
</div>

<div class="row">
  <div *ngFor="let trip of trips" class="col-12 col-md-4 mb-4">
    <app-trip-card [trip]="trip" (tripDeleted)="refreshTrips()"></app-trip-card>
  </div>
</div>
